ports:
  tcp: 5000
  udp: 5001
  ssh: 2222

rules_path: config/rules.yaml

addresses: ["1.2.3.4", "5.4.3.2"]

interface: eth0

producers:
  enabled: false
  http:
    enabled: false
    remote: https://localhost:9000
  hpfeeds:
    enabled: false
    host: 172.26.0.2
    port: 20000
    ident: ident
    auth: auth
    channel: test

conn_timeout: 45
max_tcp_payload: 4096
dial_timeout: 5

capture_traffic:
  enabled: false

spicy:
  # Spicy parser paths (HTTP parsing, TCP-payload protocol detection)
  # are enabled by default. Set to false only if you built without
  # Spicy/HILTI or want to test the Spicy-free dispatch path.
  enabled: true
