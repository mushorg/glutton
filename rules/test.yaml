rules:
  - match: tcp dst port 22 or port 2222
    type: conn_handler
    name: proxy_ssh
    target: tcp://172.17.0.2:22
  - match: tcp dst port 1234
    type: conn_handler
    target: test
  - match: udp dst port 1234
    type: conn_handler
    target: test
  - match: tcp dst port 80
    type: proxy_tcp
    target: 127.0.0.1:9889
  - match: tcp
    type: conn_handler
    target: tcp
